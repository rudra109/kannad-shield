version: '3.9'

# =============================================================
#  Kanad S.H.I.E.L.D. — Full Local Demo Stack
#  Owner: Developer 1
#  Usage: docker compose up --build
# =============================================================

services:

  # ── Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safetydb}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-safetydb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates the evidence bucket on first start
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/${MINIO_BUCKET:-evidence};
        mc anonymous set download local/${MINIO_BUCKET:-evidence};
        exit 0;
      "

  # ── Application Services ────────────────────────────────────

  sos-service:
    build:
      context: ./services/sos-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-safetydb}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_min_32_chars}
      JWT_ACCESS_EXPIRES_MINUTES: ${JWT_ACCESS_EXPIRES_MINUTES:-15}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ERSS_MODE: ${ERSS_MODE:-mock}
      ERSS_BASE_URL: ${ERSS_BASE_URL:-}
      ERSS_API_KEY: ${ERSS_API_KEY:-}
      NOTIFY_MODE: ${NOTIFY_MODE:-mock}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:4002}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  cybercrime-service:
    build:
      context: ./services/cybercrime-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-safetydb}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string_min_32_chars}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-evidence}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      AI_ENGINE_URL: ${AI_ENGINE_URL:-http://ai-engine:4002}
      NTP_SERVER: ${NTP_SERVER:-pool.ntp.org}
      PORT: 4001
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Engine (Developer 2) ──────────────────────────────────
  ai-engine:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4002:8000"

  # ── API Gateway (nginx) ─────────────────────────────────────
  api-gateway:
    image: nginx:1.25-alpine
    restart: unless-stopped
    volumes:
      - ./services/api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/api-gateway/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - sos-service
      - cybercrime-service
      - ai-engine

  # ── Web Console (Dev 3 builds this — placeholder) ────────────
  web-console:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8080:80"

# ── Volumes ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  neo4j_data:
  minio_data:
