name: kanad_shield
description: Kanad S.H.I.E.L.D. — Unified Cyber-Physical Safety Platform for Women
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP + WebSocket
  http: ^1.2.1
  web_socket_channel: ^3.0.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Media / evidence
  image_picker: ^1.1.2
  file_picker: ^8.0.7

  # Shake detection (SOS trigger)
  shake: ^2.2.0

  # SMS (fallback)
  telephony: ^0.2.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # i18n
  intl: ^0.19.0

  # Auth
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
