# =============================================================
#  Kanad S.H.I.E.L.D. — nginx API Gateway
#  Routes all /api/* traffic to the correct microservice.
#  Rate limiting applied globally.
# =============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {

    # ── Rate limiting zones ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=sos:10m    rate=10r/m;

    # ── Upstream definitions ───────────────────────────────────
    upstream sos_service {
        server sos-service:4000;
    }

    upstream cybercrime_service {
        server cybercrime-service:4001;
    }

    upstream ai_engine {
        server ai-engine:4002;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Self-signed cert for demo; replace with Let's Encrypt in production
        ssl_certificate     /etc/nginx/certs/demo.crt;
        ssl_certificate_key /etc/nginx/certs/demo.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Security headers ────────────────────────────────────
        add_header X-Frame-Options          DENY;
        add_header X-Content-Type-Options   nosniff;
        add_header X-XSS-Protection         "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        add_header Referrer-Policy          no-referrer;

        # ── CORS preflight ──────────────────────────────────────
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*";
                add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type";
                add_header Access-Control-Max-Age       86400;
                return 204;
            }
        }

        # ── Auth endpoints (strict rate limit) ──────────────────
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://sos_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── SOS endpoints ───────────────────────────────────────
        location ~ ^/api/sos/ {
            limit_req zone=sos burst=5 nodelay;
            proxy_pass         http://sos_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_read_timeout 3600s;
        }

        # ── WebSocket tracking (pass through) ───────────────────
        location /ws/ {
            proxy_pass         http://sos_service;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
        }

        # ── Cybercrime + Police Dashboard + Evidence endpoints ───
        location ~ ^/api/(cyber|police|evidence)/ {
            limit_req zone=global burst=20 nodelay;
            proxy_pass         http://cybercrime_service;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Larger body limit for evidence file uploads (50 MB)
            client_max_body_size 50m;
        }

        # ── AI Engine endpoints ──────────────────────────────────
        location ~ ^/api/ai/ {
            limit_req zone=global burst=20 nodelay;
            proxy_pass         http://ai_engine;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check (no auth, no rate limit) ────────────────
        location /health {
            proxy_pass http://sos_service/health;
        }
    }
}
